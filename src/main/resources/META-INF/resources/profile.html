<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - TaskFlow</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--bg-secondary);
            padding: 32px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }
        .profile-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: inherit;
        }
        .form-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="/dashboard.html" class="navbar-brand">
            <div class="brand-icon">⚡</div>
            <span class="brand-name">TaskFlow</span>
        </a>
        <div class="navbar-actions">
            <a href="/dashboard.html" class="btn btn-ghost btn-sm">Về bảng điều khiển</a>
            <button id="btn-logout" class="btn btn-ghost btn-sm">Đăng xuất</button>
        </div>
    </header>

    <main class="container">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profile-avatar">U</div>
                <div>
                    <h1 id="profile-name-heading" style="margin: 0; font-size: 24px;">Đang tải...</h1>
                    <div style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Thành viên TaskFlow</div>
                </div>
            </div>

            <form id="profile-form">
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập (không thể đổi)</label>
                    <input type="text" id="input-username" class="form-input" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">Email (không thể đổi)</label>
                    <input type="email" id="input-email" class="form-input" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">Họ và Tên</label>
                    <input type="text" id="input-fullname" class="form-input" required>
                </div>
                <div style="margin-top: 32px; display: flex; justify-content: flex-end;">
                    <button type="submit" class="btn btn-primary" id="btn-save">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="/js/profile.js"></script>
</body>
</html>
